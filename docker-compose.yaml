# Local Kafka stack for the StreamingETL learning project.
#
# Start it with:
#   docker compose up -d
#
# Host Python scripts connect to localhost:9092.
# Containerized Python/Spark jobs connect to kafka:29092.
# Kafka UI opens in your browser at http://localhost:9091.

x-streamingetl-app: &streamingetl-app
  build:
    context: .
    dockerfile: Dockerfile
  image: ${STREAMINGETL_APP_IMAGE:-streamingetl-app:local}
  env_file:
    - .env
  environment:
    # Inside Docker, the app must use Kafka's internal listener, not localhost.
    KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_DOCKER_BOOTSTRAP_SERVERS:-kafka:29092}
    SPARK_LOCAL_IP: 127.0.0.1
  volumes:
    # I cache Spark/Ivy connector jars so every run does not download them again.
    - spark_ivy_cache:/root/.ivy2.5.2

services:
  kafka:
    image: ${KAFKA_IMAGE:-bitnamilegacy/kafka:3.7.0}
    container_name: streamingetl-kafka
    ports:
      # Host port 9092 maps to the broker listener used by kafka_extraction.py.
      - "${KAFKA_EXTERNAL_PORT:-9092}:9092"
    environment:
      # Run Kafka in single-node KRaft mode, so ZooKeeper is not needed.
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: "broker,controller"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"

      # INTERNAL is for other Docker containers. EXTERNAL is for your laptop.
      KAFKA_CFG_LISTENERS: "INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "INTERNAL://kafka:29092,EXTERNAL://localhost:${KAFKA_EXTERNAL_PORT:-9092}"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"

      # This is for local development only. Production clusters should use auth/TLS.
      ALLOW_PLAINTEXT_LISTENER: "yes"

      # Helpful defaults for a one-broker local cluster.
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: "1"
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:29092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-init:
    image: ${KAFKA_IMAGE:-bitnamilegacy/kafka:3.7.0}
    container_name: streamingetl-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - /bin/bash
      - -c
      - |
        kafka-topics.sh --bootstrap-server kafka:29092 \
          --create --if-not-exists \
          --topic ${KAFKA_TOPIC:-wikimedia.recent_changes} \
          --partitions 3 \
          --replication-factor 1

  kafka-ui:
    image: ${KAFKA_UI_IMAGE:-provectuslabs/kafka-ui:latest}
    container_name: streamingetl-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      # I open Kafka UI on localhost:9091 so I can inspect topics in a browser.
      - "${KAFKA_UI_PORT:-9091}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      # Kafka UI runs inside Docker, so it uses Kafka's internal listener.
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  wikimedia-producer:
    <<: *streamingetl-app
    container_name: streamingetl-wikimedia-producer
    profiles: ["etl"]
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    command:
      - python
      - src/data_extraction/kafka_extraction.py
      - --limit
      - "${PRODUCER_LIMIT:-5}"

  kafka-to-bronze:
    <<: *streamingetl-app
    container_name: streamingetl-kafka-to-bronze
    profiles: ["etl"]
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      wikimedia-producer:
        condition: service_completed_successfully
    command:
      - python
      - src/data_transformation/kafka_to_bronze.py
      - --limit
      - "${SPARK_PREVIEW_LIMIT:-5}"

  silver-transform:
    <<: *streamingetl-app
    container_name: streamingetl-silver-transform
    profiles: ["etl"]
    depends_on:
      kafka-to-bronze:
        condition: service_completed_successfully
    command:
      - python
      - src/data_transformation/Spark_transformations.py
      - --limit
      - "${SPARK_PREVIEW_LIMIT:-5}"
      - --write-silver

  gold-model:
    <<: *streamingetl-app
    container_name: streamingetl-gold-model
    profiles: ["etl"]
    depends_on:
      silver-transform:
        condition: service_completed_successfully
    command:
      - python
      - src/data_transformation/silver_to_gold.py
      - --limit
      - "${SPARK_PREVIEW_LIMIT:-5}"

  dashboard:
    <<: *streamingetl-app
    container_name: streamingetl-dashboard
    profiles: ["dashboard"]
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    command:
      - streamlit
      - run
      - src/data_visualization/gold_dashboard.py
      - --server.address=0.0.0.0
      - --server.port=8501

volumes:
  kafka_data:
  spark_ivy_cache:
